<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Shahbaz Raza | Zita Telecom</title>

  <style>

    :root{
      --bg:#f4f4f4;
      --card:#ffffff;
      --text:#334155;
      --muted:#64748B;
      --blue:#1E3A8A;
      --gold:#C9A54C;
      --shadow:0 8px 25px rgba(0,0,0,0.08);
    }

    @media (prefers-color-scheme: dark){

      :root{
        --bg:#0F172A;
        --card:#111827;
        --text:#E2E8F0;
        --muted:#94A3B8;
        --blue:#60A5FA;
        --gold:#E4C46C;
        --shadow:0 8px 25px rgba(0,0,0,0.45);
      }

    }

    body{
      margin:0;
      padding:20px;
      background:var(--bg);
      font-family:Segoe UI, Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      box-sizing:border-box;
      transition:0.3s ease;
    }

    .card{
      background:var(--card);
      width:100%;
      max-width:720px;
      border-radius:20px;
      padding:28px;
      box-shadow:var(--shadow);
      box-sizing:border-box;
      transition:0.3s ease;
    }

    .top{
      display:flex;
      gap:30px;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }

    .left{
      flex:1;
      min-width:250px;
    }

    .right{
      text-align:center;
    }

    .logo{
      width:170px;
      margin-bottom:20px;
      display:block;
    }

    .name{
      font-size:30px;
      font-weight:700;
      color:var(--blue);
      margin-bottom:5px;
      transition:0.3s ease;
    }

    .designation{
      color:var(--gold);
      font-weight:600;
      margin-bottom:5px;
    }

    .company{
      color:var(--text);
      margin-bottom:20px;
      font-size:15px;
    }

    .info{
      margin:10px 0;
      color:var(--text);
      font-size:15px;
    }

    .info a{
      color:var(--text);
      text-decoration:none;
      transition:0.3s ease;
    }

    .info a:hover{
      color:var(--blue);
    }

    .name-link{
      text-decoration:none;
    }

    .qr-title{
      color:var(--gold);
      font-weight:700;
      letter-spacing:1px;
      font-size:14px;
    }

    .qr-sub{
      color:var(--blue);
      font-size:20px;
      font-weight:700;
      margin-bottom:18px;
      transition:0.3s ease;
    }

    .qr-box{
      background:var(--card);
      border:2px solid var(--gold);
      border-radius:14px;
      padding:12px;
      display:inline-block;
      transition:0.3s ease;
    }

    .qr-box img{
      width:180px;
      display:block;
      border-radius:8px;
      cursor:pointer;
    }

    .scan{
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
    }

    .footer{
      margin-top:25px;
      padding-top:15px;
      border-top:1px solid var(--gold);
      text-align:center;
      color:var(--text);
      font-size:12px;
      letter-spacing:0.5px;
    }

    @media(max-width:600px){

      body{
        padding:14px;
      }

      .card{
        padding:22px;
      }

      .top{
        flex-direction:column;
        align-items:flex-start;
      }

      .right{
        width:100%;
        text-align:center;
      }

      .logo{
        width:150px;
      }

      .name{
        font-size:26px;
      }

      .qr-box img{
        width:200px;
      }

    }

  </style>

</head>

<body>

  <div class="card">

    <div class="top">

      <!-- LEFT -->
      <div class="left">

        <!-- LOGO -->
        <a href="https://www.zitatel.com" target="_blank">
          <img 
            src="https://razashahbaz0.github.io/zitatel/Zlogo.png"
            class="logo"
          >
        </a>

        <!-- NAME -->
        <a 
          href="https://www.linkedin.com/in/razashahbaz"
          target="_blank"
          class="name-link"
        >
          <div class="name">
            Shahbaz Raza
          </div>
        </a>

        <!-- DESIGNATION -->
        <div class="designation">
          Technical Support
        </div>

        <!-- COMPANY -->
        <div class="company">
          Zita Telecom Private Limited
        </div>

        <!-- PHONE -->
        <div class="info">
          📞 
          <a href="tel:+919147081013">
            +91 91470 81013
          </a>
        </div>

        <!-- EMAIL -->
        <div class="info">
          📧 
          <a href="mailto:shahbaz@zitatel.com">
            shahbaz@zitatel.com
          </a>
        </div>

        <!-- WEBSITE -->
        <div class="info">
          🌐 
          <a href="https://www.zitatel.com" target="_blank">
            www.zitatel.com
          </a>
        </div>

      </div>

      <!-- RIGHT -->
      <div class="right">

        <div class="qr-title">
          SCAN TO
        </div>

        <div class="qr-sub">
          SAVE CONTACT
        </div>

        <!-- CLICKABLE QR -->
        <div class="qr-box">

          <a 
            href="https://razashahbaz0.github.io/zitatel/contacts.vcf"
            download
          >

            <img 
              src="https://razashahbaz0.github.io/zitatel/Contact.jpeg"
            >

          </a>

        </div>

        <div class="scan">
          Open Camera • Scan • Save
        </div>

      </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      BUILDING TRUST • STRENGTHENING CONNECTIONS • POWERING POSSIBILITIES
    </div>

  </div>

</body>
</html>
