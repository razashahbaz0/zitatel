<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Shahbaz Raza | Zita Telecom</title>

  <style>

    body{
      margin:0;
      padding:20px;
      background:#f4f4f4;
      font-family:Segoe UI, Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .card{
      background:#ffffff;
      width:100%;
      max-width:700px;
      border-radius:18px;
      padding:25px;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);
      box-sizing:border-box;
    }

    .top{
      display:flex;
      gap:25px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .left{
      flex:1;
      min-width:250px;
    }

    .right{
      text-align:center;
    }

    .logo{
      width:170px;
      margin-bottom:20px;
    }

    .name{
      font-size:30px;
      font-weight:700;
      color:#1E3A8A;
      margin-bottom:5px;
    }

    .designation{
      color:#C9A54C;
      font-weight:600;
      margin-bottom:5px;
    }

    .company{
      color:#475569;
      margin-bottom:20px;
    }

    .info{
      margin:8px 0;
      color:#334155;
      font-size:15px;
    }

    .info a{
      color:#334155;
      text-decoration:none;
    }

    .qr-title{
      color:#C9A54C;
      font-weight:700;
      letter-spacing:1px;
      font-size:14px;
    }

    .qr-sub{
      color:#1E3A8A;
      font-size:20px;
      font-weight:700;
      margin-bottom:18px;
    }

    .qr-box{
      background:#fff;
      border:2px solid #C9A54C;
      border-radius:14px;
      padding:12px;
      display:inline-block;
    }

    .qr-box img{
      width:180px;
      display:block;
      border-radius:8px;
    }

    .scan{
      margin-top:10px;
      color:#64748B;
      font-size:13px;
    }

    .footer{
      margin-top:25px;
      padding-top:15px;
      border-top:1px solid #C9A54C;
      text-align:center;
      color:#475569;
      font-size:12px;
      letter-spacing:0.5px;
    }

    @media(max-width:600px){

      .top{
        flex-direction:column;
        align-items:flex-start;
      }

      .right{
        width:100%;
        text-align:center;
      }

      .logo{
        width:150px;
      }

      .name{
        font-size:26px;
      }

      .qr-box img{
        width:200px;
      }

    }

  </style>
</head>

<body>

  <div class="card">

    <div class="top">

      <!-- LEFT -->
      <div class="left">

        <img 
          src="https://razashahbaz0.github.io/zitatel/Zlogo.png"
          class="logo"
        >

        <div class="name">
          Shahbaz Raza
        </div>

        <div class="designation">
          Technical Support
        </div>

        <div class="company">
          Zita Telecom Private Limited
        </div>

        <div class="info">
          📞 
          <a href="tel:+919147081013">
            +91 91470 81013
          </a>
        </div>

        <div class="info">
          ✉ 
          <a href="mailto:shahbaz@zitatel.com">
            shahbaz@zitatel.com
          </a>
        </div>

        <div class="info">
          🌐 
          <a href="https://www.zitatel.com">
            www.zitatel.com
          </a>
        </div>

      </div>

      <!-- RIGHT -->
      <div class="right">

        <div class="qr-title">
          SCAN TO
        </div>

        <div class="qr-sub">
          SAVE CONTACT
        </div>

        <div class="qr-box">

          <img 
            src="https://razashahbaz0.github.io/zitatel/Contact.jpeg"
          >

        </div>

        <div class="scan">
          Open Camera • Scan • Save
        </div>

      </div>

    </div>

    <div class="footer">
      BUILDING TRUST • STRENGTHENING CONNECTIONS • POWERING POSSIBILITIES
    </div>

  </div>

</body>
</html>
